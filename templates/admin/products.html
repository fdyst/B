<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Produk</title>

<style>
body { font-family: Arial; background:#f4f6fb; margin:0; }

.header {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    padding:15px;
    text-align:center;
}

.container { padding:15px; }

.card {
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button {
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    margin-top:6px;
}

.btn-primary{background:#667eea;color:white;}
.btn-danger{background:#e74c3c;color:white;}
.btn-warning{background:#f39c12;color:white;}
.btn-success{background:#2ecc71;color:white;}

select,input{width:100%;padding:8px;margin-bottom:10px;}

.fab{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#667eea;
    color:white;
    border-radius:50%;
    width:55px;
    height:55px;
    font-size:28px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    width:90%;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
    <h3>📦 Manajemen Produk</h3>
    <button class="btn-success" style="width:auto;margin-top:10px;"
        onclick="openCategoryModal()">⚙ Kelola Kategori</button>
</div>

<div class="container">

    <select id="categoryFilter" onchange="loadProducts()">
        <option value="">Semua Kategori</option>
    </select>

    <div id="productList">Loading...</div>

</div>

<button class="fab" onclick="openCreateModal()">+</button>

<!-- MODAL CREATE PRODUCT -->
<div class="modal" id="createModal">
<div class="modal-content">
<h3>Tambah Produk</h3>

<input type="text" id="name" placeholder="Nama Produk">
<select id="categorySelect"></select>

<select id="product_type">
<option value="manual">Manual</option>
<option value="api">API</option>
</select>

<input type="number" id="price_base" placeholder="Harga Dasar">
<select id="margin_type">
<option value="percent">Percent</option>
<option value="fixed">Fixed</option>
</select>
<input type="number" id="margin_value" placeholder="Margin">

<button class="btn-primary" onclick="createProduct()">Simpan</button>
<button onclick="closeCreateModal()">Batal</button>

</div>
</div>

<!-- MODAL CATEGORY -->
<div class="modal" id="categoryModal">
<div class="modal-content">
<h3>Kelola Kategori</h3>

<input type="text" id="newCategoryName" placeholder="Nama kategori baru">
<button class="btn-primary" onclick="createCategory()">Tambah</button>

<div id="categoryListAdmin" style="margin-top:15px;"></div>

<button onclick="closeCategoryModal()">Tutup</button>
</div>
</div>

<script src="/static/js/admin/product.js"></script>
</body>
</html>
