<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h2>Welcome, {{ admin_email }}</h2>
    <h3>Users</h3>
    <ul>
      {% for user in users %}
        <li>{{ user.email }} (Role: {{ user.role }})</li>
      {% endfor %}
    </ul>
    <h3>Orders</h3>
    <ul>
      {% for order in orders %}
        <li>{{ order.order_number }} - {{ order.status }} - {{ order.price }}</li>
      {% endfor %}
    </ul>
    <a href="/admin/logout">Logout</a>
  </div>
</body>
</html>
